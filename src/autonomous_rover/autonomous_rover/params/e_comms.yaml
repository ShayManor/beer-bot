e_comms_node:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"   # WAVE ROVER ESP32 over USB/UART
    baud_rate: 115200
    cmd_vel_topic: "cmd_vel"
    robot_state_topic: "/robot_state"   # idle here forces wheels stopped (hard motion gate)
    imu_topic: "imu/data"
    mag_topic: "imu/mag"
    imu_frame_id: "imu_link"
    imu_rate: 50.0                 # Hz to poll {"T":126} for IMU feedback
    cmd_timeout: 0.5              # s; stop wheels if cmd_vel goes stale
    # Skid-steer feedforward (calibrate in phase 1: command -> measured velocity).
    # L/R are open-loop motor duty for the encoder-less rover: firmware sets
    # PWM = L*512 on an 8-bit channel, so L in [-0.49, 0.49] spans full throttle.
    wheel_cmd_per_mps: 0.4        # duty per m/s: full duty 0.5 / top speed 1.25
    wheel_cmd_per_radps: 0.2      # per-wheel duty differential per rad/s of turn
    max_wheel_cmd: 0.49          # ~100% PWM; L*512 just under the 8-bit cap (255)
    min_wheel_cmd: 0.18          # deadband floor; lift moving wheel past breakaway (~92 PWM)
