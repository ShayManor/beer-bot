master_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 8080
    goal_frame_id: "map"
    log_buffer_size: 200
    cloud_max_points: 20000
    teleop_linear: 1.25
    teleop_angular: 1.5
    calib_repo_dir: ""     # abs path to the rover's git repo root; enables calib write+push
    # The depth-model calibration flow also reads (mirror localization.yaml on-device):
    #   depth_model_path, onnx_providers, depth_input_size, qnn_options, camera_height_m
